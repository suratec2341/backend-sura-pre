name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  validate-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test -- --runInBand
      - run: npm run test:e2e -- --runInBand
      - run: npm run build

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://blansole:blansole@localhost:5432/blansole

      - name: Validate Docker Compose config
        run: docker compose -f infra/docker-compose.yml config

  validate-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Compile Python sources
        run: python -m compileall apps/worker-ai/src libs/python/src

      - name: Validate Python packaging
        run: python -m pip install --dry-run ./libs/python ./apps/worker-ai
