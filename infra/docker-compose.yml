# docker-compose for local development
# Usage: docker compose -f infra/docker-compose.yml up -d --build
# Values are read from ../.env when running from the repository root.

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: blansole-nginx
    ports:
      - "${NGINX_HTTP_PORT:-8081}:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: blansole-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8081}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8081/api/v1}
      PUBLIC_API_HOST: ${PUBLIC_API_HOST:-localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8081}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://blansole:blansole@postgres:5432/blansole}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      S3_ENDPOINT: ${DOCKER_S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-blansole-dev}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-CHANGE_ME_DEV_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-CHANGE_ME_DEV_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/api/v1/auth/google/callback}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL:-http://localhost:3000/api/v1/auth/facebook/callback}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      APNS_PRIVATE_KEY: ${APNS_PRIVATE_KEY:-}
      APNS_ENV: ${APNS_ENV:-sandbox}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker-session:
    build:
      context: ..
      dockerfile: apps/worker-session/Dockerfile
    container_name: blansole-worker-session
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://blansole:blansole@postgres:5432/blansole}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      S3_ENDPOINT: ${DOCKER_S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-blansole-dev}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker-ai:
    build:
      context: ..
      dockerfile: apps/worker-ai/Dockerfile
    container_name: blansole-worker-ai
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://blansole:blansole@postgres:5432/blansole}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8081}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8081/api/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-notification:
    build:
      context: ..
      dockerfile: apps/worker-notification/Dockerfile
    container_name: blansole-worker-notification
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://blansole:blansole@postgres:5432/blansole}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      APNS_PRIVATE_KEY: ${APNS_PRIVATE_KEY:-}
      APNS_ENV: ${APNS_ENV:-sandbox}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-health-sync:
    build:
      context: ..
      dockerfile: apps/worker-health-sync/Dockerfile
    container_name: blansole-worker-health-sync
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://blansole:blansole@postgres:5432/blansole}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-link-checker:
    build:
      context: ..
      dockerfile: apps/worker-link-checker/Dockerfile
    container_name: blansole-worker-link-checker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://blansole:blansole@postgres:5432/blansole}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-episode-summary:
    build:
      context: ..
      dockerfile: apps/worker-episode-summary/Dockerfile
    container_name: blansole-worker-episode-summary
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://blansole:blansole@postgres:5432/blansole}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: blansole-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blansole}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blansole}
      POSTGRES_DB: ${POSTGRES_DB:-blansole}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-blansole} -d ${POSTGRES_DB:-blansole}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blansole-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: blansole-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000" # API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Console UI

volumes:
  pg_data:
  redis_data:
  minio_data:
